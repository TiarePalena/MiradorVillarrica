<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Brochure de Mirador Villarica - Descarga o visualiza nuestra propuesta inmobiliaria">
    <title>Brochure - Mirador de Villarrica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mirador-villarica-style.css">
    <link rel="icon" type="image/x-icon" href="imagenes/Logo-Amarillo.png">
    <style>
        .brochure-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .brochure-header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }

        .brochure-header h1 {
            color: #2b443a;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .brochure-header p {
            color: #666;
            font-size: 1.1rem;
        }

        .brochure-content {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .pdf-viewer {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .pdf-viewer embed,
        .pdf-viewer iframe {
            width: 100%;
            height: 900px;
            border: none;
        }

        .brochure-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .btn-download,
        .btn-print,
        .btn-share {
            padding: 12px 30px;
            border: none;
            border-radius: 34px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-download {
            background: #efb550;
            color: #2b443a;
        }

        .btn-download:hover {
            background: #e5a540;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(239, 181, 80, 0.4);
        }

        .btn-print {
            background: #2b443a;
            color: white;
        }

        .btn-print:hover {
            background: #1f2f27;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(43, 68, 58, 0.4);
        }

        .btn-share {
            background: transparent;
            color: #2b443a;
            border: 2px solid #2b443a;
        }

        .btn-share:hover {
            background: #2b443a;
            color: white;
            transform: translateY(-2px);
        }

        .brochure-info {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            animation: fadeInUp 0.8s ease 0.6s both;
        }

        .brochure-info h2 {
            color: #2b443a;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .brochure-info p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .info-item-brochure {
            background: linear-gradient(135deg, #efb550, #e5a540);
            padding: 20px;
            border-radius: 10px;
            color: #2b443a;
            font-weight: 600;
            text-align: center;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .brochure-header h1 {
                font-size: 2rem;
            }

            .pdf-viewer embed,
            .pdf-viewer iframe {
                height: 500px;
            }

            .brochure-actions {
                flex-direction: column;
            }

            .btn-download,
            .btn-print,
            .btn-share {
                width: 100%;
                justify-content: center;
            }

            .brochure-info {
                padding: 25px;
            }
        }
    </style>
</head>

<body>
    <!-- Navegación -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <img class="logo-desktop" src="imagenes/LOGO1.png" alt="Mirador Villarica Logo">
                    <img class="logo-mobile" src="imagenes/terra-segura-logo-mobile.png" alt="Mirador Villarica Logo Mobile">
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html#inicio">Inicio</a></li>
                <li><a href="brochure.html">Brochure</a></li>
                <li><a href="index.html#tour-section">Tour 360°</a></li>
                <li class="nav-btn-mobile">
                    <a href="index.html#footer" class="nav-btn">Conversemos</a>
                </li>
            </ul>
            <a href="index.html#footer" class="nav-btn nav-btn-desktop">Conversemos</a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Brochure Content -->
    <div class="brochure-container">

        <div class="brochure-content">

            <!-- PDF Viewer -->
            <div class="pdf-viewer">
                <!-- OPCIÓN 1: Usar <embed> para mostrar el PDF -->
                <embed src="TerraSegura - Brochure Mobile Mirador de Villarrica.pdf" type="application/pdf">
                
                <!-- OPCIÓN 3: Para navegadores que no soportan embed, usar iframe
                <iframe src="TerraSegura - Brochure Mobile Mirador de Villarrica.pdf"></iframe>
                -->
            </div>

            <!-- Action Buttons -->
            <div class="brochure-actions">
                <a href="TerraSegura - Brochure Mobile Mirador de Villarrica.pdf" download class="btn-download">
                    <span></span> Descargar PDF
                </a>
            </div>
        </div>
    </div>

    <script src="mirador-villarica-script.js"></script>
    <script>
        // Función para compartir
        function compartir() {
            if (navigator.share) {
                navigator.share({
                    title: 'Mirador Villarica',
                    text: 'Descubre el Brochure de Mirador Villarica',
                    url: window.location.href
                }).catch(err => console.log('Error compartiendo:', err));
            } else {
                alert('Copia este enlace para compartir:\n' + window.location.href);
            }
        }

        // Menú hamburguesa (reutilizar del script principal)
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');

        if (hamburger) {
            hamburger.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                const spans = hamburger.querySelectorAll('span');
                if (navMenu.classList.contains('active')) {
                    spans[0].style.transform = 'rotate(45deg) translate(7px, 7px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translate(7px, -7px)';
                } else {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            });

            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.addEventListener('click', () => {
                    navMenu.classList.remove('active');
                    const spans = hamburger.querySelectorAll('span');
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                });
            });
        }
    </script>
</body>

</html>
